<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTransit | Live Bus Tracker</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- CSS Files -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="routeList.css">
    <link rel="stylesheet" href="map.css">
    <link rel="stylesheet" href="busDetails.css">
    <link rel="stylesheet" href="fareCalculator.css">
</head>

<body>
    <!-- Header Component -->
    <div id="header-container">
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M8 21h8"></path>
                        <path d="M12 17v4"></path>
                        <circle cx="7" cy="13" r="2"></circle>
                        <circle cx="17" cy="13" r="2"></circle>
                    </svg>
                </div>
                <h1 class="title">Omni<span class="title-accent">Transit</span></h1>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search Bus Number or Bus name" class="search-input" />
            </div>

            <div class="actions-container">
                <div class="profile-avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" />
                </div>
            </div>
        </header>
    </div>

    <!-- Fare Calculator Modal -->
    <div id="fare-calc-container">
        <div class="modal-overlay hidden" id="fare-modal">
            <div class="fare-modal-content">
                <div class="modal-header">
                    <h2>Fare Calculator</h2>
                    <button class="close-modal" id="close-fare-modal">&times;</button>
                </div>
                
                <div class="modal-body">
                    <div class="input-group">
                        <label>Select Route</label>
                        <select id="fare-route-select">
                            <option value="">Choose a route...</option>
                        </select>
                    </div>
                    
                    <div class="fare-inputs">
                        <div class="input-group">
                            <label>From Stop</label>
                            <select id="fare-from-stop" disabled>
                                <option value="">Select starting stop...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>To Stop</label>
                            <select id="fare-to-stop" disabled>
                                <option value="">Select destination...</option>
                            </select>
                        </div>
                    </div>

                    <div class="fare-result hidden" id="fare-result-panel">
                        <div class="fare-summary">
                            <div class="summary-item">
                                <span class="summary-label">Estimated Fare</span>
                                <span class="summary-value" id="fare-amount">₹0.00</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Distance</span>
                                <span class="summary-value" id="fare-distance">0.0 km</span>
                            </div>
                        </div>
                        <div class="fare-info">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <span>Fares are based on distance travelled between stops.</span>
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button class="btn-primary" id="calculate-fare-btn" disabled>Calculate Fare</button>
                </div>
            </div>
        </div>
    </div>

    <main class="main">
        <div class="content">
            <!-- Route List Component -->
            <div id="route-list-container">
                <div class="sidebar-actions">
                    <div class="sidebar-action-item" id="sidebar-fare-calc">
                        <div class="action-icon ticket-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M2 9V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4"></path>
                                <path d="M2 15v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4"></path>
                                <path d="M2 9a3 3 0 0 1 0 6"></path>
                                <path d="M22 9a3 3 0 0 0 0 6"></path>
                                <line x1="12" y1="3" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <span>Fare Calculator</span>
                    </div>
                </div>

                <div class="route-list-container">
                    <div class="route-list-header" id="reset-routes-view" style="cursor: pointer;">
                        <h2>Active Routes</h2>
                        <span class="route-count" id="route-count-display">0</span>
                    </div>
                    <div class="route-list" id="route-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <div class="dashboard">
                <div class="map-area">
                    <div id="map-container" class="map-wrapper">
                        <!-- Leaflet map -->
                    </div>
                </div>

                <!-- Bus Details Component -->
                <div id="bus-details-container">
                    <!-- Bus Details Overlay (Hidden by default) -->
                    <div class="details-overlay hidden" id="bus-details">
                        <div class="panel">
                            <div class="panel-header">
                                <h3 id="bus-id-display">Bus #</h3>
                                <span class="status-badge" id="bus-status-badge">On Time</span>
                            </div>

                            <div class="section">
                                <div class="label">Current Route</div>
                                <div class="route-pill" id="route-pill">
                                    <span class="route-number" id="route-number-display">--</span>
                                    <span class="route-name" id="route-name-display">--</span>
                                </div>
                            </div>

                            <div class="grid">
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <polyline points="12 6 12 12 16 14"></polyline>
                                        </svg>
                                    </div>
                                    <div class="stat-info">
                                        <span class="stat-label">Next Stop</span>
                                        <span class="stat-value" id="next-stop-display">--</span>
                                    </div>
                                </div>

                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-purple)" stroke-width="2">
                                            <path d="M5 18H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.19M15 6h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-3.19"></path>
                                            <line x1="23" y1="13" x2="23" y2="11"></line>
                                            <line x1="19" y1="13" x2="19" y2="11"></line>
                                        </svg>
                                    </div>
                                    <div class="stat-info">
                                        <span class="stat-label">Speed</span>
                                        <span class="stat-value" id="speed-display">--</span>
                                    </div>
                                </div>

                                <div class="stat-card" id="wait-time-card">
                                    <div class="stat-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-orange)" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <line x1="12" y1="6" x2="12" y2="12"></line>
                                            <line x1="12" y1="12" x2="16" y2="10"></line>
                                        </svg>
                                    </div>
                                    <div class="stat-info">
                                        <span class="stat-label">Stopping for</span>
                                        <span class="stat-value" id="wait-time-display">0s</span>
                                    </div>
                                </div>

                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2">
                                            <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path>
                                            <circle cx="12" cy="10" r="3"></circle>
                                        </svg>
                                    </div>
                                    <div class="stat-info">
                                        <span class="stat-label">ETA</span>
                                        <span class="stat-value" id="eta-display">--</span>
                                    </div>
                                </div>
                            </div>

                            <div class="section">
                                <div class="label">
                                    <span>Capacity</span>
                                    <span id="capacity-text">0 / 0</span>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-bar" id="capacity-bar"></div>
                                </div>
                            </div>

                            <div class="driver-profile">
                                <div class="driver-avatar">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                </div>
                                <div class="driver-info">
                                    <span class="driver-label">Driver</span>
                                    <span class="driver-name" id="driver-name-display">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- Custom Logic -->
    <script src="mockData.js"></script>
    <script src="map.js"></script>
    <script src="app.js"></script>
</body>

</html>
